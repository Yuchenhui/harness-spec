name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc

      - name: Verify CLI runs
        run: node bin/openspec.js --help

      - name: Verify hook scripts are executable
        run: |
          test -x hooks/stop-check.sh
          test -x hooks/session-init.sh
          test -x hooks/post-tool-notify.sh

      - name: Verify hook JSON output (stop-check with no feature_tests.json)
        run: |
          RESULT=$(echo '{}' | bash hooks/stop-check.sh 2>/dev/null || true)
          echo "$RESULT" | node -e "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))" \
            && echo "Valid JSON ✓" || (echo "Invalid JSON: $RESULT" && exit 1)

      - name: Check no Chinese in core agents
        run: |
          for f in agents/evaluator.md agents/fixer.md agents/spec-reviewer.md agents/initializer.md; do
            if grep -P '[\x{4e00}-\x{9fff}]' "$f" 2>/dev/null; then
              echo "FAIL: Chinese found in $f"
              exit 1
            fi
          done
          echo "All core agents in English ✓"

      - name: Check templates are in sync with agents
        run: |
          diff agents/evaluator.md templates/.claude/agents/evaluator.md
          diff agents/fixer.md templates/.claude/agents/fixer.md
          diff agents/spec-reviewer.md templates/.claude/agents/spec-reviewer.md
          diff agents/initializer.md templates/.claude/agents/initializer.md
          echo "Templates in sync ✓"
