name: harness-driven
version: 1
description: |
  Spec-driven development with harness engineering verification.
  Extends OpenSpec's proposal → specs → design → tasks flow with:
  - Spec Review (interactive quality gate before test generation)
  - Verification Initializer (generate test skeletons from specs)
  - Harness Apply (code → evaluate → fix loop with independent subagents)
  - Multi-level verification (L1-L5, including Playwright browser testing)

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity.
      - **What Changes**: Bullet list of changes. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: Use kebab-case names (e.g., `user-auth`).
        - **Modified Capabilities**: Check `openspec/specs/` for existing names.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Keep it concise (1-2 pages). Focus on "why" not "how".
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications with Given/When/Then scenarios
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior (include full updated content)
      - **REMOVED Requirements**: Deprecated features (include Reason and Migration)

      Format:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - Every requirement MUST have at least one scenario

      **HARNESS TIP**: Write scenarios with specific, concrete values whenever possible.
      Instead of "Given valid data", write "Given email 'test@example.com' and password 'Pass123!'".
      The more specific the scenario, the better tests the Initializer can generate.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      Include only if the change involves:
      - Cross-cutting changes or new architectural patterns
      - New external dependencies or significant data model changes
      - Security, performance, or migration complexity

      Sections:
      - **Context**: Background, current state, constraints
      - **Goals / Non-Goals**: What this achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?)
      - **Risks / Trade-offs**: Known limitations. Format: [Risk] → Mitigation

      **HARNESS TIP**: Be explicit about data model constraints (unique fields,
      foreign keys, cascade rules) — the Spec Reviewer will check if these
      constraints have corresponding test scenarios in specs.
    requires:
      - proposal

  # ---- Harness phases below ----

  - id: review
    generates: specs/**/*.md
    description: Interactive spec quality review — strengthens scenarios, adds error/edge cases
    instruction: |
      Review the full change file chain (proposal → design → specs) for verifiability.

      This phase uses the spec-reviewer agent to:
      1. Check each scenario for specificity, verifiability, completeness
      2. Find design decisions not covered by any spec scenario
      3. Suggest missing error/edge case scenarios
      4. Present findings to user via AskUserQuestion for confirmation
      5. Write approved changes back to specs files [harness-reviewed]

      The review is INTERACTIVE — the user decides which suggestions to accept.
      Do NOT auto-apply changes without user confirmation.

      NOTE: design.md is optional (only created for complex changes).
      If design.md exists, include it in the review chain. If not, skip design gap analysis.
    requires:
      - specs

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Reference the reviewed specs for what needs to be built.
    requires:
      - review

  - id: init-tests
    generates: feature_tests.json
    description: Generate test skeletons and verification material from reviewed specs
    instruction: |
      Generate verification material BEFORE coding begins.

      This phase uses the verification-initializer agent to:
      1. Read reviewed specs and tasks
      2. Assign verification_level (L1-L5) to each task
      3. Generate test skeleton files with real assertions (not empty shells)
      4. Generate API contract files for L3 tasks
      5. Generate browser scenario files for L4 tasks
      6. Generate feature_tests.json with all verification metadata

      All generated tests should currently FAIL (no implementation yet).
      The Coding Agent's goal is to make them pass.

      Pre-generated tests are the "exam" — written by the Initializer,
      not by the same agent that writes the implementation.
    requires:
      - tasks
      - review

apply:
  requires: [init-tests]
  tracks: tasks.md
  instruction: |
    Execute tasks one at a time with independent verification.

    For each pending task in feature_tests.json:

    1. CODING: Implement the task. Do NOT modify pre-generated test files.
       If pre_generated_tests is true, only write implementation code.
       For L4 tasks, ensure UI elements have data-testid attributes.
       Git commit after implementation.

    2. EVALUATE: Launch an independent evaluator subagent (Task tool).
       The evaluator runs in a separate context — no bias from coding.
       - L1/L2/L3: Run verification_commands (pytest, curl, etc.)
       - L4: Use Playwright MCP browser tools for black-box testing
       - L5: Take screenshots, output NEEDS_HUMAN_REVIEW
       The evaluator outputs STATUS: PASS or FAIL.

    3. FIX (if FAIL): Launch a fixer subagent to make targeted repairs.
       The fixer reads the evaluation report, fixes only what failed.
       It cannot modify test files or feature_tests.json.
       After fix, re-evaluate (max 3 attempts).

    4. PROGRESS: Update feature_tests.json (passes: true) and
       claude-progress.txt. Git commit. Move to next task.

    If a task fails 3 times, pause and ask the user for guidance.

    The Stop hook prevents exiting until all tasks in feature_tests.json
    have passes: true. Do not try to exit early.
